<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV BUILDER | VERTEX_OS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@media print {
.no-print { display: none !important; }
body { background: white; }
.cv-preview {
width: 100% !important;
margin: 0 !important;
padding: 0 !important;
box-shadow: none !important;
}
}
.cv-preview { min-height: 297mm; }
</style>
</head>
<body class="bg-zinc-100 font-sans text-zinc-900">
<div class="flex flex-col lg:flex-row min-h-screen">
<!-- INPUT PANEL -->
<div class="lg:w-1/3 p-8 bg-white shadow-xl no-print overflow-y-auto max-h-screen">
<h1 class="text-2xl font-black mb-6 uppercase tracking-tighter">CV Builder</h1>
<div class="space-y-4">
<section>
<h2 class="font-bold border-b mb-2 uppercase text-xs opacity-50">Personal Details</h2>
<input type="text" id="in-name" placeholder="Full Name" class="w-full p-2 border mb-2 rounded" oninput="sync()">
<input type="text" id="in-title" placeholder="Professional Title" class="w-full p-2 border mb-2 rounded" oninput="sync()">
<input type="email" id="in-email" placeholder="Email" class="w-full p-2 border mb-2 rounded" oninput="sync()">
<input type="text" id="in-phone" placeholder="Phone" class="w-full p-2 border mb-2 rounded" oninput="sync()">
</section>
<section>
<h2 class="font-bold border-b mb-2 uppercase text-xs opacity-50">Summary</h2>
<textarea id="in-summary" placeholder="Brief professional summary..." class="w-full p-2 border mb-2 rounded h-24" oninput="sync()"></textarea>
</section>
<section>
<h2 class="font-bold border-b mb-2 uppercase text-xs opacity-50">Experience</h2>
<textarea id="in-exp" placeholder="Role, Company (Dates) - Description" class="w-full p-2 border mb-2 rounded h-32" oninput="sync()"></textarea>
</section>
<section>
<h2 class="font-bold border-b mb-2 uppercase text-xs opacity-50">Education</h2>
<textarea id="in-edu" placeholder="Degree, Institution (Dates)" class="w-full p-2 border mb-2 rounded h-24" oninput="sync()"></textarea>
</section>
<section>
<h2 class="font-bold border-b mb-2 uppercase text-xs opacity-50">Skills</h2>
<input type="text" id="in-skills" placeholder="Skills (comma separated)" class="w-full p-2 border mb-2 rounded" oninput="sync()">
</section>
<button onclick="window.print()" class="w-full bg-black text-white font-bold py-4 rounded uppercase tracking-widest hover:bg-zinc-800 transition-all">
Download PDF
</button>
</div>
</div>
<!-- PREVIEW PANEL -->
<div class="flex-1 flex justify-center p-8 overflow-y-auto">
<div id="cv-content" class="cv-preview bg-white w-[210mm] p-12 shadow-2xl">
<header class="border-b-4 border-black pb-6 mb-8">
<h1 id="out-name" class="text-5xl font-black uppercase leading-none mb-2">Full Name</h1>
<p id="out-title" class="text-xl font-bold opacity-70">Professional Title</p>
<div class="flex gap-4 mt-4 text-sm font-medium">
<span id="out-email">email@example.com</span>
<span id="out-phone">000-000-0000</span>
</div>
</header>
<div class="grid grid-cols-3 gap-12">
<div class="col-span-2 space-y-8">
<section>
<h3 class="font-black uppercase text-sm border-b-2 border-black mb-4">Summary</h3>
<p id="out-summary" class="leading-relaxed"></p>
</section>
<section>
<h3 class="font-black uppercase text-sm border-b-2 border-black mb-4">Professional Experience</h3>
<div id="out-exp" class="whitespace-pre-line leading-relaxed"></div>
</section>
</div>
<div class="space-y-8">
<section>
<h3 class="font-black uppercase text-sm border-b-2 border-black mb-4">Skills</h3>
<ul id="out-skills" class="list-none space-y-1 font-medium italic"></ul>
</section>
<section>
<h3 class="font-black uppercase text-sm border-b-2 border-black mb-4">Education</h3>
<div id="out-edu" class="whitespace-pre-line leading-relaxed text-sm"></div>
</section>
</div>
</div>
</div>
</div>
</div>
<script>
function sync() {
document.getElementById('out-name').innerText = document.getElementById('in-name').value || 'Full Name';
document.getElementById('out-title').innerText = document.getElementById('in-title').value || 'Professional Title';
document.getElementById('out-email').innerText = document.getElementById('in-email').value || 'email@example.com';
document.getElementById('out-phone').innerText = document.getElementById('in-phone').value || '000-000-0000';
document.getElementById('out-summary').innerText = document.getElementById('in-summary').value;
document.getElementById('out-exp').innerText = document.getElementById('in-exp').value;
document.getElementById('out-edu').innerText = document.getElementById('in-edu').value;
const skills = document.getElementById('in-skills').value.split(',');
const skillsOut = document.getElementById('out-skills');
skillsOut.innerHTML = '';
skills.forEach(skill => {
if(skill.trim()) {
const li = document.createElement('li');
li.innerText = skill.trim();
skillsOut.appendChild(li);
}
});
}
</script>
</body>
</html>
